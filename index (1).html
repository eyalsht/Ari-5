<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎂 יום הולדת 5 — רשימת מתנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#FF6B6B;--orange:#FF8E53;--yellow:#FFD93D;--green:#6BCB77;--blue:#4D96FF;--bg:#FFF9F2}
body{font-family:'Heebo',sans-serif;background:var(--bg);min-height:100vh}

@keyframes float  {0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
@keyframes float2 {0%,100%{transform:translateY(0) rotate(7deg)}50%{transform:translateY(-20px) rotate(-7deg)}}
@keyframes float3 {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes popIn  {0%{transform:scale(.85);opacity:0}75%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn {from{opacity:0}to{opacity:1}}
@keyframes confettiDrop{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(600deg);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes syncFlash{0%,100%{opacity:1}50%{opacity:.4}}

#header{
  background:linear-gradient(140deg,#FF6B6B 0%,#FF8E53 45%,#FFD93D 100%);
  padding:36px 20px 28px;text-align:center;position:relative;
  overflow:hidden;box-shadow:0 6px 30px rgba(255,107,107,.35)
}
#header::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1.5' fill='rgba(255,255,255,.15)'/%3E%3C/svg%3E")
}
.balloon{position:absolute;font-size:40px;user-select:none;pointer-events:none}
.b1{top:10px;right:18px;animation:float 3.2s ease-in-out infinite}
.b2{top:8px;left:22px;animation:float2 4s ease-in-out infinite;font-size:48px}
.b3{bottom:8px;right:56px;animation:float3 5s ease-in-out infinite;font-size:30px}
.b4{bottom:6px;left:38px;animation:float 4.5s ease-in-out infinite reverse;font-size:32px}
#header h1{color:#fff;font-size:clamp(28px,7vw,46px);font-weight:900;text-shadow:0 3px 14px rgba(0,0,0,.2);line-height:1.1;margin-bottom:6px;letter-spacing:-.5px}
#header p{color:rgba(255,255,255,.88);font-size:15px;font-weight:600;margin-bottom:3px}
#header small{color:rgba(255,255,255,.72);font-size:13px;font-weight:500}
#progress-wrap{margin:22px auto 0;max-width:340px;background:rgba(255,255,255,.28);border-radius:999px;height:13px;overflow:hidden}
#progress-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#6BCB77,#4ade80);transition:width .7s cubic-bezier(.4,0,.2,1)}
#stats{display:flex;justify-content:center;gap:28px;margin-top:14px}
.stat{color:#fff;text-align:center}
.stat-num{font-size:24px;font-weight:900;line-height:1}
.stat-lbl{font-size:12px;opacity:.82;margin-top:2px}
.stat-div{width:1px;background:rgba(255,255,255,.3);margin:3px 0}

/* sync indicator */
#sync-bar{
  background:rgba(255,255,255,.95);
  padding:8px 16px;text-align:center;
  font-size:13px;font-weight:700;color:#374151;
  display:flex;align-items:center;justify-content:center;gap:8px;
  border-bottom:2px solid #f3f4f6;
  min-height:38px;
}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#6BCB77}
.sync-dot.loading{background:#FFD93D;animation:syncFlash .8s ease-in-out infinite}
.sync-dot.error{background:#ef4444}

#filters{display:flex;justify-content:center;gap:8px;padding:18px 16px 8px;flex-wrap:wrap}
.tab{
  padding:8px 22px;border-radius:999px;border:2px solid #e5e7eb;
  font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;background:#fff;color:#6b7280;transition:all .2s;white-space:nowrap
}
.tab:hover{border-color:#FF6B6B;color:#FF6B6B}
.tab.active-all      {background:#374151;border-color:#374151;color:#fff;box-shadow:0 4px 12px #37415140}
.tab.active-available{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 4px 12px #FF6B6B55}
.tab.active-purchased{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 4px 12px #6BCB7755}

#grid{
  display:block;padding:14px 16px 100px;
  max-width:920px;margin:0 auto
}
.cat-section{margin-bottom:26px;animation:fadeIn .3s ease both}
.cat-header{
  display:flex;align-items:center;gap:10px;
  margin:0 4px 12px;padding:8px 4px;
  border-bottom:2px dashed #e5e7eb
}
.cat-chip{
  display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:12px;font-size:22px;
  box-shadow:0 3px 10px rgba(0,0,0,.08)
}
.cat-title{font-size:17px;font-weight:900;color:#1f2937;letter-spacing:-.3px}
.cat-count{font-size:13px;font-weight:700;color:#9ca3af;margin-right:auto}
.cat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(158px,1fr));
  gap:14px
}
.card{
  background:#fff;border-radius:18px;padding:14px 14px 14px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
  transition:transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
  animation:popIn .35s ease both;border-top:4px solid transparent
}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(0,0,0,.13)}
.card.purchased{background:#f0fdf4}
.card .media{
  width:100%;height:104px;border-radius:12px;
  background:#f9fafb;display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;overflow:hidden
}
.card .media img{max-width:100%;max-height:100%;object-fit:contain}
.card .media.emoji-only{font-size:54px;background:transparent;line-height:1}
.card .name{font-size:13.5px;font-weight:700;color:#1f2937;text-align:center;line-height:1.4;min-height:38px;display:flex;align-items:center;justify-content:center}
.card.purchased .name{text-decoration:line-through;color:#9ca3af}
.card .price{
  text-align:center;font-weight:900;font-size:17px;
  color:#16a34a;margin-top:6px;letter-spacing:-.3px;
  min-height:22px;display:flex;align-items:center;justify-content:center;gap:4px
}
.card .price.loading{color:#9ca3af;font-size:12px;font-weight:600}
.card .price.loading::before{
  content:'';width:9px;height:9px;border-radius:50%;
  border:2px solid #e5e7eb;border-top-color:#FF8E53;
  display:inline-block;animation:spin .7s linear infinite
}
.card .price.unknown{color:#d1d5db;font-size:12px;font-weight:600}
.card.purchased .price{color:#9ca3af;text-decoration:line-through}
.check-badge{
  position:absolute;top:10px;right:10px;
  width:28px;height:28px;border-radius:50%;
  background:#6BCB77;color:#fff;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(107,203,119,.45);animation:popIn .3s ease
}
.rm-btn{
  position:absolute;top:8px;left:8px;width:25px;height:25px;
  border-radius:50%;border:none;background:#fee2e2;color:#ef4444;
  font-size:13px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;opacity:0;transition:opacity .2s,transform .15s;z-index:2
}
.card:hover .rm-btn{opacity:1}
.rm-btn:hover{transform:scale(1.2);background:#fca5a5}
.confirm-overlay{
  position:absolute;inset:0;background:rgba(255,255,255,.97);
  border-radius:18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;z-index:10;
  padding:14px;text-align:center
}
.confirm-overlay .q{font-weight:700;font-size:14px;color:#374151}
.confirm-btns{display:flex;gap:8px}
.btn-del{padding:7px 16px;border-radius:9px;border:none;background:#ef4444;color:#fff;font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;font-size:13px}
.btn-cancel{padding:7px 16px;border-radius:9px;border:2px solid #e5e7eb;background:#fff;font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;font-size:13px}
.link-btn{
  display:block;width:100%;margin-top:10px;padding:8px 10px;
  border-radius:10px;border:none;color:#fff;font-family:'Heebo',sans-serif;
  font-size:13px;font-weight:700;text-align:center;text-decoration:none;
  cursor:pointer;transition:filter .15s,transform .15s
}
.link-btn:hover{filter:brightness(1.12);transform:scale(1.02)}
.mark-btn{
  display:block;width:100%;margin-top:8px;padding:8px 10px;
  border-radius:10px;border:2px solid #d1d5db;background:transparent;
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;
  color:#6b7280;cursor:pointer;transition:all .2s
}
.mark-btn:hover{border-color:#6BCB77;color:#6BCB77;background:#f0fdf4}
.mark-btn.is-marked{border-color:#6BCB77;color:#16a34a;background:#dcfce7}
.img-btn{
  display:block;width:100%;margin-top:6px;padding:6px 8px;
  border-radius:8px;border:1px dashed #d1d5db;background:transparent;
  font-family:'Heebo',sans-serif;font-size:11px;font-weight:700;
  color:#9ca3af;cursor:pointer;transition:all .2s
}
.img-btn:hover{border-color:#4D96FF;color:#4D96FF;background:#eff6ff}
#empty{text-align:center;padding:60px 20px;color:#9ca3af;display:none}
#empty .empty-icon{font-size:52px;margin-bottom:12px}
#empty p{font-size:16px;font-weight:700}

#fab{
  position:fixed;bottom:24px;left:24px;width:60px;height:60px;
  border-radius:50%;border:none;
  background:linear-gradient(135deg,#FF6B6B,#FF8E53);
  color:#fff;font-size:32px;cursor:pointer;
  box-shadow:0 6px 24px rgba(255,107,107,.5);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,box-shadow .2s;z-index:100
}
#fab:hover{transform:scale(1.1) rotate(10deg);box-shadow:0 10px 32px rgba(255,107,107,.6)}

#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;display:none;align-items:center;justify-content:center;
  padding:16px;animation:fadeIn .2s ease
}
#modal-overlay.open{display:flex}
#modal{background:#fff;border-radius:24px;padding:28px 22px;width:100%;max-width:420px;animation:popIn .3s ease;direction:rtl}
#modal h2{font-weight:900;font-size:22px;color:#1f2937;text-align:center;margin-bottom:4px}
#modal .sub{font-size:13px;color:#9ca3af;text-align:center;margin-bottom:20px}
.minput{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:12px;font-family:'Heebo',sans-serif;font-size:16px;outline:none;transition:border-color .2s;direction:rtl;margin-bottom:12px;color:#111}
.minput:focus{border-color:#FF6B6B}
.minput-ltr{direction:ltr;text-align:left}
.mlabel{font-weight:700;font-size:13px;color:#374151;display:block;margin-bottom:6px}
#emoji-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:116px;overflow-y:auto;margin-bottom:18px}
.ep{width:36px;height:36px;border-radius:8px;border:2px solid transparent;background:#f3f4f6;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.ep:hover,.ep.sel{border-color:#FF6B6B;background:#fff1f2;transform:scale(1.12)}
.modal-actions{display:flex;gap:10px}
.btn-add{flex:1;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;font-family:'Heebo',sans-serif;font-weight:800;font-size:16px;cursor:pointer;transition:filter .15s}
.btn-add:disabled{background:#e5e7eb;color:#9ca3af;cursor:default}
.btn-add:not(:disabled):hover{filter:brightness(1.08)}
.btn-close2{flex:1;padding:13px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;color:#6b7280;font-family:'Heebo',sans-serif;font-weight:700;font-size:16px;cursor:pointer}
.cpiece{position:fixed;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiDrop linear forwards}
#cat-select{
  width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:12px;
  font-family:'Heebo',sans-serif;font-size:15px;outline:none;direction:rtl;
  margin-bottom:12px;background:#fff;color:#111;cursor:pointer
}
#cat-select:focus{border-color:#FF6B6B}

@media(max-width:400px){
  .cat-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  #grid{padding:10px 10px 90px}
  .cat-header{margin:0 0 10px}
  .cat-title{font-size:15px}
  .card .media{height:90px}
}
</style>
</head>
<body>

<div id="confetti"></div>

<div id="header">
  <div class="balloon b1">🎈</div>
  <div class="balloon b2">🎈</div>
  <div class="balloon b3">🎉</div>
  <div class="balloon b4">🎊</div>
  <div style="font-size:54px;margin-bottom:8px">🥳</div>
  <h1>יום הולדת 5!</h1>
  <p>רשימת המתנות של הילד שלנו 🎁</p>
  <small>סמנו מה קניתם כדי שלא יכפלו מתנות</small>
  <div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div id="stats">
    <div class="stat"><div class="stat-num" id="s-avail">—</div><div class="stat-lbl">זמינות לקנייה</div></div>
    <div class="stat-div"></div>
    <div class="stat"><div class="stat-num" id="s-done">—</div><div class="stat-lbl">כבר נקנו ✓</div></div>
    <div class="stat-div"></div>
    <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">סה״כ מתנות</div></div>
  </div>
</div>

<div id="sync-bar">
  <div class="sync-dot loading" id="sync-dot"></div>
  <span id="sync-txt">מתחבר לאחסון משותף...</span>
</div>

<div id="filters">
  <button class="tab active-all"      data-f="all"       onclick="setFilter(this)">הכל <span id="cnt-all"></span></button>
  <button class="tab"                 data-f="available" onclick="setFilter(this)">זמינות <span id="cnt-avail"></span></button>
  <button class="tab"                 data-f="purchased" onclick="setFilter(this)">נקנו ✓ <span id="cnt-done"></span></button>
</div>

<div id="grid">
  <div id="empty">
    <div class="empty-icon" id="empty-icon">🎊</div>
    <p id="empty-txt">אין מתנות בקטגוריה זו</p>
  </div>
</div>

<button id="fab" onclick="openModal()" title="הוסף מתנה">+</button>

<div id="modal-overlay" onclick="overlayClick(event)">
  <div id="modal">
    <h2 id="modal-title">🎁 הוסף מתנה</h2>
    <p class="sub" id="modal-sub">הוסיפו מתנה שהילד ביקש</p>
    <label class="mlabel">שם המתנה *</label>
    <input id="inp-name" class="minput" placeholder="למשל: טרמפולינה" oninput="updateAddBtn()" onkeydown="if(event.key==='Enter')doAdd()"/>
    <label class="mlabel">קטגוריה</label>
    <select id="cat-select"></select>
    <label class="mlabel">קישור לאתר (לא חובה)</label>
    <input id="inp-url" class="minput minput-ltr" placeholder="https://..." dir="ltr"/>
    <label class="mlabel">מחיר ב-₪ (לא חובה — יימשך אוטומטית מהקישור)</label>
    <input id="inp-price" class="minput minput-ltr" placeholder="199" inputmode="decimal" dir="ltr"/>
    <label class="mlabel">קישור לתמונה (לא חובה)</label>
    <input id="inp-img" class="minput minput-ltr" placeholder="https://...jpg" dir="ltr"/>
    <label class="mlabel" style="margin-bottom:8px">אמוג׳י (גיבוי אם אין תמונה)</label>
    <div id="emoji-grid"></div>
    <div class="modal-actions">
      <button class="btn-add" id="btn-add" disabled onclick="doAdd()">הוסף 🎉</button>
      <button class="btn-close2" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get }
       from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

// ▼▼▼ החלף את הערכים האלה בconfig מהפרויקט שלך ב-Firebase ▼▼▼
const firebaseConfig = {
  apiKey:            "AIzaSy-XXXXX-החלף",
  authDomain:        "שם-הפרויקט.firebaseapp.com",
  databaseURL:       "https://שם-הפרויקט-default-rtdb.firebaseio.com",
  projectId:         "שם-הפרויקט",
  storageBucket:     "שם-הפרויקט.appspot.com",
  messagingSenderId: "000000000000",
  appId:             "1:000000000000:web:xxxxxxxxxxxxxxxx"
};
// ▲▲▲ ████████████████████████████████████████████████████ ▲▲▲

const EMOJIS = ["🎁","🎮","🎨","⚽","🚀","🌊","🎲","🧩","🎤","🏖️","✨","🌸","🐠","🔭","🏰","🧱","🪁","💧","🍓","❄️","🃏","🧭","🕵️","🎯","🎪","🏁","⛺","🍝","🍣","🪃","🥏","🏄","🛣️","🐵","🔍","🍦","🎉","🎊","🌟","🦋"];
const COLORS = ["#FF6B6B","#FF8E53","#FFB347","#FFD93D","#6BCB77","#4D96FF","#C77DFF","#FF6B9D","#00C9FF","#2EC4B6","#FF9F1C","#A8DADC","#F4A261","#E76F51","#457B9D"];

const CATEGORIES = [
  { id:'water',    name:'משחקי מים',           emoji:'💧', color:'#4D96FF' },
  { id:'beach',    name:'חוף, חול וים',        emoji:'🏖️', color:'#FF9F1C' },
  { id:'kitchen',  name:'מטבח ובישול',         emoji:'🍳', color:'#FF8E53' },
  { id:'games',    name:'משחקי קופסה וקלפים',  emoji:'🎲', color:'#C77DFF' },
  { id:'creative', name:'יצירה ואומנות',       emoji:'🎨', color:'#FF6B9D' },
  { id:'marble',   name:'מסלולי כדורים',       emoji:'⚽', color:'#FFD93D' },
  { id:'outdoor',  name:'חוץ ותנועה',          emoji:'🪁', color:'#6BCB77' },
  { id:'explore',  name:'חקירה וגילוי',        emoji:'🔭', color:'#2EC4B6' },
  { id:'misc',     name:'שונות',              emoji:'🎁', color:'#A8DADC' },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c=>[c.id,c]));

function autoCategory(g){
  if(g.category && CAT_MAP[g.category]) return g.category;
  const n = (g.name||'').toLowerCase();
  if(/מים|water wonder|תעלת מים|שולחן מים|מטבח לבחוץ/.test(n)) return 'water';
  if(/חול|quut|חוף|sandpal|castle builders|צלילה|כביש m|קופי לגונה|antal/.test(n)) return 'beach';
  if(/פסטה|סושי|ברבקיו|מטבח ילדים|בישול/.test(n)) return 'kitchen';
  if(/קופסא|קופסה|קלפים|londji|djeco|מיסטריקס|tiny game|מרוץ בשלג|היכון הכן צא|סולוגיק|תאפלה/.test(n)) return 'games';
  if(/יצירה|נייר כסף|מובייל|מייבש פרחים|הפתעות.*חלל/.test(n)) return 'creative';
  if(/marble|cuboro|מסלול/.test(n)) return 'marble';
  if(/עפיפון|מחבטים|אוהל|טיפי|סקוטש/.test(n)) return 'outdoor';
  if(/מצפן|משקפת|גששי|בלש|גלאי|hape/.test(n)) return 'explore';
  return 'misc';
}

// ─── Firebase Init ───────────────────────────────────────────
let app, db, giftsRef, purchasedRef;
let gifts = [], purchased = new Set(), currentFilter = 'all', selectedEmoji = '🎁';

function setSyncStatus(status, txt) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-txt');
  dot.className = 'sync-dot ' + status;
  label.textContent = txt;
}

try {
  app = initializeApp(firebaseConfig);
  db  = getDatabase(app);
  giftsRef     = ref(db, 'gifts');
  purchasedRef = ref(db, 'purchased');

  // ─── Listen for real-time changes ───────────────────────────
  onValue(giftsRef, snap => {
    const val = snap.val();
    gifts = val ? Object.values(val) : DEFAULT_GIFTS;
    if (!val) set(giftsRef, Object.fromEntries(DEFAULT_GIFTS.map(g=>[g.id,g])));
    render();
  });

  onValue(purchasedRef, snap => {
    const val = snap.val();
    purchased = new Set(val ? Object.keys(val).filter(k=>val[k]).map(Number) : []);
    setSyncStatus('', '🔗 מסונכרן עם כל המשפחה — שינויים נראים לכולם בזמן אמת');
    render();
  });

} catch(e) {
  setSyncStatus('error', '⚠️ בעיית חיבור — בדוק את ה-Firebase config');
  gifts = DEFAULT_GIFTS;
  render();
}

// ─── Actions ─────────────────────────────────────────────────
async function togglePurchased(id) {
  const next = new Set(purchased);
  if (next.has(id)) { next.delete(id); }
  else { next.add(id); spawnConfetti(); }
  purchased = next;
  const obj = {};
  for (const x of next) obj[x] = true;
  await set(purchasedRef, obj);
}

async function removeGift(id) {
  gifts = gifts.filter(g => g.id !== id);
  purchased.delete(id);
  await set(giftsRef, Object.fromEntries(gifts.map(g=>[g.id,g])));
  await set(purchasedRef, Object.fromEntries([...purchased].map(id=>[id,true])));
}

window.setFilter = btn => { currentFilter = btn.dataset.f; render(); };

// ─── Add modal ───────────────────────────────────────────────
let editingId = null;

function buildCatSelect() {
  const sel = document.getElementById('cat-select');
  sel.innerHTML = '';
  CATEGORIES.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = `${c.emoji} ${c.name}`;
    sel.appendChild(o);
  });
}

window.openModal = (existing = null) => {
  editingId = existing?.id ?? null;
  document.getElementById('modal-title').textContent = existing ? '✏️ עריכת מתנה' : '🎁 הוסף מתנה';
  document.getElementById('modal-sub').textContent = existing ? 'עדכנו את פרטי המתנה' : 'הוסיפו מתנה שהילד ביקש';
  document.getElementById('btn-add').textContent = existing ? 'שמור 💾' : 'הוסף 🎉';
  document.getElementById('inp-name').value  = existing?.name  || '';
  document.getElementById('inp-url').value   = existing?.url   || '';
  document.getElementById('inp-img').value   = existing?.img   || '';
  document.getElementById('inp-price').value = existing?.price != null ? existing.price : '';
  selectedEmoji = existing?.emoji || '🎁';
  buildCatSelect();
  document.getElementById('cat-select').value = existing?.category || autoCategory({name:''}) || 'misc';
  buildEmojiGrid();
  updateAddBtn();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 100);
};
window.closeModal = () => document.getElementById('modal-overlay').classList.remove('open');
window.overlayClick = e => { if (e.target.id === 'modal-overlay') closeModal(); };
window.updateAddBtn = () => {
  document.getElementById('btn-add').disabled = !document.getElementById('inp-name').value.trim();
};
window.doAdd = async () => {
  const name = document.getElementById('inp-name').value.trim();
  const url  = document.getElementById('inp-url').value.trim() || null;
  const img  = document.getElementById('inp-img').value.trim() || null;
  const priceRaw = document.getElementById('inp-price').value.trim();
  const price = priceRaw && !isNaN(+priceRaw) ? +priceRaw : null;
  const category = document.getElementById('cat-select').value || 'misc';
  if (!name) return;
  if (editingId != null) {
    gifts = gifts.map(g => g.id === editingId ? { ...g, name, emoji:selectedEmoji, url, img, price, category } : g);
  } else {
    gifts.push({ id: Date.now(), name, emoji: selectedEmoji, url, img, price, category });
  }
  await set(giftsRef, Object.fromEntries(gifts.map(g=>[g.id,g])));
  editingId = null;
  closeModal();
};

// ─── Price fetching (client-side via CORS proxies) ───────────
const CORS_PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
const priceInflight = new Set();
const priceFailed   = new Set();
const priceQueue    = [];
let priceQueueRunning = false;
const MAX_CONCURRENT_FETCHES = 3;

function formatPrice(n) {
  if (n >= 1000) return n.toLocaleString('he-IL', { maximumFractionDigits: 0 });
  return (Math.round(n*100)/100).toString();
}

function extractPrice(html) {
  if (!html) return null;
  // 1. JSON-LD blocks
  const ldRe = /<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
  let m;
  while ((m = ldRe.exec(html))) {
    try {
      const raw = m[1].trim();
      const data = JSON.parse(raw);
      const items = Array.isArray(data) ? data : (data['@graph'] ? data['@graph'] : [data]);
      for (const it of items) {
        const offers = it.offers || it.Offers;
        if (offers) {
          const arr = Array.isArray(offers) ? offers : [offers];
          for (const o of arr) {
            const p = o.price ?? o.lowPrice ?? o.highPrice;
            if (p != null && !isNaN(+p)) return +p;
          }
        }
        const p = it.price;
        if (p != null && !isNaN(+p)) return +p;
      }
    } catch(e) {}
  }
  // 2. OG / product meta
  const metas = [
    /<meta[^>]+property=["']product:price:amount["'][^>]+content=["']([^"']+)["']/i,
    /<meta[^>]+content=["']([^"']+)["'][^>]+property=["']product:price:amount["']/i,
    /<meta[^>]+property=["']og:price:amount["'][^>]+content=["']([^"']+)["']/i,
    /<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:price:amount["']/i,
    /<meta[^>]+itemprop=["']price["'][^>]+content=["']([^"']+)["']/i,
    /<meta[^>]+content=["']([^"']+)["'][^>]+itemprop=["']price["']/i,
    /<meta[^>]+name=["']twitter:data1["'][^>]+content=["']([^"']*₪[^"']*)["']/i,
  ];
  for (const r of metas) {
    const mm = html.match(r);
    if (mm) {
      const num = mm[1].replace(/[^\d.]/g, '');
      if (num && !isNaN(+num)) return +num;
    }
  }
  // 3. Visible ILS price (skip very small / very large extremes)
  const candidates = [];
  const ilsRe = /(?:₪|\bNIS\b|\bILS\b|ש["׳']?ח)\s*([\d][\d,]*(?:\.\d{1,2})?)|([\d][\d,]*(?:\.\d{1,2})?)\s*(?:₪|\bNIS\b|\bILS\b|ש["׳']?ח)/gi;
  let im;
  while ((im = ilsRe.exec(html))) {
    const raw = (im[1] || im[2] || '').replace(/,/g, '');
    const v = +raw;
    if (!isNaN(v) && v >= 5 && v <= 100000) candidates.push(v);
  }
  if (candidates.length) {
    // Pick the most frequent (likely the actual product price)
    const freq = {};
    candidates.forEach(v => freq[v] = (freq[v]||0)+1);
    return +Object.entries(freq).sort((a,b)=>b[1]-a[1] || a[0]-b[0])[0][0];
  }
  return null;
}

async function fetchPriceFor(url) {
  for (const proxify of CORS_PROXIES) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 15000);
      const resp = await fetch(proxify(url), { signal: ctrl.signal });
      clearTimeout(t);
      if (!resp.ok) continue;
      const html = await resp.text();
      const price = extractPrice(html);
      if (price) return price;
    } catch(e) { /* try next proxy */ }
  }
  return null;
}

function schedulePriceFetch(gift) {
  if (!gift.url || gift.price != null) return;
  if (priceInflight.has(gift.id) || priceFailed.has(gift.id)) return;
  priceQueue.push(gift);
  runPriceQueue();
}

async function runPriceQueue() {
  if (priceQueueRunning) return;
  priceQueueRunning = true;
  const updates = [];
  let flushTimer = null;
  const scheduleFlush = () => {
    if (flushTimer) return;
    flushTimer = setTimeout(async () => {
      flushTimer = null;
      if (!updates.length) return;
      const batch = updates.splice(0);
      gifts = gifts.map(g => {
        const u = batch.find(b => b.id === g.id);
        return u ? { ...g, price: u.price } : g;
      });
      try { await set(giftsRef, Object.fromEntries(gifts.map(g=>[g.id,g]))); } catch(e) {}
    }, 800);
  };

  const workers = Array.from({ length: MAX_CONCURRENT_FETCHES }, async () => {
    while (priceQueue.length) {
      const g = priceQueue.shift();
      if (!g || priceInflight.has(g.id)) continue;
      priceInflight.add(g.id);
      const price = await fetchPriceFor(g.url);
      priceInflight.delete(g.id);
      if (price) {
        updates.push({ id: g.id, price });
        scheduleFlush();
      } else {
        priceFailed.add(g.id);
        // Re-render that one card to show "מחיר לא נמצא"
        const idx = gifts.findIndex(x => x.id === g.id);
        if (idx >= 0) {
          const tmp = gifts[idx];
          gifts[idx] = { ...tmp };
        }
      }
    }
  });
  await Promise.all(workers);
  // Final flush
  if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
  if (updates.length) {
    const batch = updates.splice(0);
    gifts = gifts.map(g => {
      const u = batch.find(b => b.id === g.id);
      return u ? { ...g, price: u.price } : g;
    });
    try { await set(giftsRef, Object.fromEntries(gifts.map(g=>[g.id,g]))); } catch(e) {}
  }
  // Re-render to update "failed" cards
  render();
  priceQueueRunning = false;
}

// ─── Render ──────────────────────────────────────────────────
function render() {
  // Ensure every gift has a category (migrate older Firebase data)
  gifts = gifts.map(g => g.category && CAT_MAP[g.category] ? g : { ...g, category: autoCategory(g) });

  const filtered = gifts.filter(g =>
    currentFilter === 'available' ? !purchased.has(g.id) :
    currentFilter === 'purchased' ?  purchased.has(g.id) : true
  );
  const purchCount = [...purchased].filter(id => gifts.find(g=>g.id===id)).length;
  const availCount = gifts.length - purchCount;
  const pct = gifts.length ? Math.round(purchCount/gifts.length*100) : 0;

  document.getElementById('s-avail').textContent  = availCount;
  document.getElementById('s-done').textContent   = purchCount;
  document.getElementById('s-total').textContent  = gifts.length;
  document.getElementById('cnt-all').textContent   = `(${gifts.length})`;
  document.getElementById('cnt-avail').textContent = `(${availCount})`;
  document.getElementById('cnt-done').textContent  = `(${purchCount})`;
  document.getElementById('progress-bar').style.width = pct + '%';

  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab';
    if (t.dataset.f === currentFilter) t.classList.add('active-' + currentFilter);
  });

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.appendChild(empty);
    empty.style.display = 'block';
    document.getElementById('empty-icon').textContent = currentFilter==='purchased' ? '🛒':'🎊';
    document.getElementById('empty-txt').textContent  = currentFilter==='purchased' ? 'עדיין לא סומנה מתנה':'אין מתנות בקטגוריה זו';
    return;
  }
  empty.style.display = 'none';

  // Group by category
  const byCat = {};
  filtered.forEach(g => {
    const c = g.category && CAT_MAP[g.category] ? g.category : 'misc';
    (byCat[c] = byCat[c] || []).push(g);
  });

  let idx = 0;
  CATEGORIES.forEach(cat => {
    const items = byCat[cat.id];
    if (!items || !items.length) return;
    const section = document.createElement('div');
    section.className = 'cat-section';

    const header = document.createElement('div');
    header.className = 'cat-header';
    const chip = document.createElement('div');
    chip.className = 'cat-chip';
    chip.textContent = cat.emoji;
    chip.style.background = cat.color + '22';
    header.appendChild(chip);
    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = cat.name;
    header.appendChild(title);
    const count = document.createElement('div');
    count.className = 'cat-count';
    count.textContent = `${items.length} פריטים`;
    header.appendChild(count);
    section.appendChild(header);

    const catGrid = document.createElement('div');
    catGrid.className = 'cat-grid';
    items.forEach(gift => { catGrid.appendChild(buildCard(gift, idx++, cat)); });
    section.appendChild(catGrid);
    grid.appendChild(section);
  });
}

function buildCard(gift, i, cat) {
  const isP  = purchased.has(gift.id);
  const color = cat ? cat.color : COLORS[i % COLORS.length];
  const div  = document.createElement('div');
  div.className = 'card' + (isP?' purchased':'');
  div.style.borderTopColor = isP ? '#6BCB77' : color;
  div.style.animationDelay = (i*.04)+'s';

  const rm = document.createElement('button');
  rm.className='rm-btn'; rm.textContent='✕'; rm.title='הסר מרשימה';
  rm.onclick=(e)=>{e.stopPropagation();showConfirm(div,gift.id);};
  div.appendChild(rm);

  if(isP){const b=document.createElement('div');b.className='check-badge';b.textContent='✓';div.appendChild(b);}

  const media = document.createElement('div');
  media.className = 'media';
  if (gift.img) {
    const img = document.createElement('img');
    img.src = gift.img;
    img.alt = gift.name;
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.onerror = () => { media.classList.add('emoji-only'); media.textContent = gift.emoji || '🎁'; };
    media.appendChild(img);
  } else {
    media.classList.add('emoji-only');
    media.textContent = gift.emoji || '🎁';
  }
  div.appendChild(media);

  const nm=document.createElement('div');nm.className='name';nm.textContent=gift.name;div.appendChild(nm);

  const priceEl = document.createElement('div');
  priceEl.className = 'price';
  if (gift.price != null && !isNaN(+gift.price)) {
    priceEl.textContent = '₪' + formatPrice(+gift.price);
  } else if (gift.url && !priceFailed.has(gift.id)) {
    priceEl.classList.add('loading');
    priceEl.textContent = 'טוען מחיר…';
    schedulePriceFetch(gift);
  } else if (gift.url) {
    priceEl.classList.add('unknown');
    priceEl.textContent = '— מחיר לא נמצא —';
  } else {
    priceEl.classList.add('unknown');
    priceEl.textContent = '— ללא מחיר —';
  }
  div.appendChild(priceEl);

  if(gift.url&&!isP){
    const a=document.createElement('a');a.className='link-btn';a.href=gift.url;a.target='_blank';a.rel='noopener noreferrer';
    a.textContent='🛍️ לצפייה במתנה';a.style.background=color;div.appendChild(a);
  }
  const mk=document.createElement('button');
  mk.className='mark-btn'+(isP?' is-marked':'');
  mk.textContent=isP?'✓ נקנה! לחץ לביטול':'סמן כנקנה';
  mk.onclick=(e)=>{e.stopPropagation();togglePurchased(gift.id);};
  div.appendChild(mk);

  const editBtn = document.createElement('button');
  editBtn.className = 'img-btn';
  editBtn.textContent = gift.img ? '✏️ ערוך תמונה / פרטים' : '🖼️ הוסף תמונה / ערוך';
  editBtn.onclick = (e) => { e.stopPropagation(); window.openModal(gift); };
  div.appendChild(editBtn);

  return div;
}

function showConfirm(cardEl, id) {
  const old=cardEl.querySelector('.confirm-overlay'); if(old) old.remove();
  const ov=document.createElement('div'); ov.className='confirm-overlay';
  ov.innerHTML=`<div style="font-size:28px">🗑️</div><div class="q">להסיר מהרשימה?</div><div class="confirm-btns"><button class="btn-del">הסר</button><button class="btn-cancel">ביטול</button></div>`;
  ov.querySelector('.btn-del').onclick=()=>removeGift(id);
  ov.querySelector('.btn-cancel').onclick=()=>ov.remove();
  cardEl.appendChild(ov);
}

// ─── Emoji grid ──────────────────────────────────────────────
function buildEmojiGrid(){
  const g=document.getElementById('emoji-grid'); g.innerHTML='';
  EMOJIS.forEach(em=>{
    const b=document.createElement('button');
    b.className='ep'+(em===selectedEmoji?' sel':''); b.textContent=em;
    b.onclick=()=>{selectedEmoji=em; g.querySelectorAll('.ep').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');};
    g.appendChild(b);
  });
}

// ─── Confetti ────────────────────────────────────────────────
function spawnConfetti(){
  const wrap=document.getElementById('confetti');
  const cols=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF8E53'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div'); p.className='cpiece';
    const s=7+Math.random()*8;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;top:-20px;background:${cols[i%6]};border-radius:${i%3===0?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
    wrap.appendChild(p); setTimeout(()=>p.remove(),4500);
  }
}

buildEmojiGrid();
spawnConfetti();
</script>
